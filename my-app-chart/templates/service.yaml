apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-app-chart.fullname" . | default .Chart.Name }}-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      nodePort: {{ .Values.service.nodePort }}
  selector:
    app: {{ .Chart.Name }}
